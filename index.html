<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio Player</title>
<style>
:root{--body:#0b3f51;--screen:#dff1ff;--accent:#12384a;--progress:#75c8cf;--cover:#b7e3dd;--text:#12384a}
*{box-sizing:border-box} html,body{margin:0;min-height:100%;background:transparent;font-family:Arial,sans-serif;color:var(--text)}
body{display:grid;place-items:center;padding:20px}.wrap{text-align:center}.brand{font:700 20px/1.2 Arial,sans-serif;margin:0 0 14px;color:#0d1b2a}.brand b{font-weight:900}.phone{width:290px;background:var(--body);border:2px solid rgba(0,0,0,.35);border-radius:17px;padding:22px 13px 26px;box-shadow:0 18px 30px rgba(0,0,0,.14);position:relative}.speaker{width:48px;height:5px;border-radius:999px;background:rgba(255,255,255,.78);margin:0 auto 12px}.screen{background:var(--screen);height:385px;position:relative;overflow:hidden;padding:36px 14px 14px}.screen:before,.screen:after{content:"";position:absolute;inset:-20%;background:linear-gradient(115deg,transparent 0 35%,rgba(255,255,255,.32) 36% 45%,transparent 46%);pointer-events:none}.screen:after{transform:translateX(45%)}.cover{width:58%;aspect-ratio:1/1;border-radius:14px;background:var(--cover);margin:0 auto 13px;display:grid;place-items:center;overflow:hidden;position:relative;z-index:1}.cover img{width:100%;height:100%;object-fit:cover;display:block}.note{font-size:54px;color:var(--accent)}.repo{font-size:11px;letter-spacing:.04em;margin-bottom:10px;opacity:.82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;z-index:1}.song{font-size:11px;text-transform:uppercase;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;z-index:1}.bar{height:5px;background:rgba(0,0,0,.12);border-radius:999px;cursor:pointer;overflow:hidden;position:relative;z-index:1}.fill{height:100%;width:0;background:var(--progress);border-radius:999px}.time{display:flex;justify-content:space-between;font-size:8px;margin-top:4px;position:relative;z-index:1}.controls{display:flex;align-items:center;justify-content:space-around;margin-top:16px;position:relative;z-index:1}.cbtn{border:0;background:transparent;color:var(--accent);font-size:24px;line-height:1;cursor:pointer;padding:5px}.play{width:46px;height:46px;border-radius:50%;font-size:34px;display:grid;place-items:center}.mini{font-size:16px;font-weight:900}.active{color:var(--progress);text-shadow:0 0 8px var(--progress)}.viz{height:38px;display:flex;gap:4px;align-items:end;justify-content:center;margin-top:10px;position:relative;z-index:1}.viz i{display:block;width:5px;height:7px;border-radius:999px;background:var(--progress);opacity:.55}.playing .viz i{animation:bounce .75s infinite ease-in-out}.viz i:nth-child(2){animation-delay:.1s}.viz i:nth-child(3){animation-delay:.2s}.viz i:nth-child(4){animation-delay:.35s}.viz i:nth-child(5){animation-delay:.05s}@keyframes bounce{0%,100%{height:8px}50%{height:32px}}.plist{position:absolute;left:12px;right:12px;bottom:12px;max-height:58%;overflow:auto;background:rgba(255,255,255,.96);border:1px solid rgba(0,0,0,.12);border-radius:14px;padding:10px;box-shadow:0 10px 30px rgba(0,0,0,.18);display:none;z-index:5}.plist.open{display:block}.plist h3{margin:0 0 8px;font-size:12px}.track{padding:8px;border-radius:10px;font-size:12px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}.track:hover,.track.now{background:var(--cover)}.status{font-size:11px;color:#667085;margin-top:10px;max-width:290px}.embed-help{margin-top:12px;font-size:12px}.embed-help code{background:#eef3f6;border-radius:8px;padding:4px 6px}audio{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Chekanaska&nbsp;&nbsp;/&nbsp;&nbsp;<b>audioplayer</b></div>
  <div class="phone">
    <div class="speaker"></div>
    <div class="screen">
      <div class="cover"><img id="cover" src="https://static.klipy.com/ii/c98c4a4935d23b95805f0befee091d8a/8d/4a/Bui1PgqT.gif" referrerpolicy="no-referrer" alt="" onerror="this.remove();document.getElementById('fallback').style.display='block'"><div class="note" id="fallback" style="display:none">♪</div></div>
      <div class="repo">Chekanaska / audioplayer</div>
      <div class="song" id="song">Загрузка треков...</div>
      <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
      <div class="time"><span id="cur">0:00</span><span id="dur">0:00</span></div>
      <div class="controls"><button class="cbtn mini" id="shuffle" title="Случайный порядок">⤨</button><button class="cbtn" id="prev">◀◀</button><button class="cbtn play" id="play">▶</button><button class="cbtn" id="next">▶▶</button><button class="cbtn mini" id="list">☰</button></div>
      <div class="viz"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="plist" id="plist"><h3>Плейлист</h3><div id="tracks"></div></div>
    </div>
    <audio id="audio" preload="metadata" crossorigin="anonymous"></audio>
  </div>
  <div class="status" id="status">Если треки не найдутся автоматически, проверь, что mp3 лежат в этом же публичном репозитории.</div>
</div>
<script>
const AUDIO_EXT=/\.(mp3|ogg|wav|m4a|aac)(\?.*)?$/i;
const fallbackUrls=[
  'https://chekanaska.github.io/audioplayer/005_WiderWorld2e_SB3_Track_0_5.mp3',
  'https://chekanaska.github.io/audioplayer/007_WiderWorld2e_SB3_Track_0_7.mp3'
];
let tracks=[],idx=0,random=false;
const $=id=>document.getElementById(id);
const a=$('audio'),song=$('song'),play=$('play'),fill=$('fill'),cur=$('cur'),dur=$('dur'),phone=document.querySelector('.phone'),plist=$('plist'),tracksBox=$('tracks'),status=$('status');
function titleFromUrl(u){try{return decodeURIComponent(new URL(u).pathname.split('/').pop()||'Audio').replace(/\.(mp3|ogg|wav|m4a|aac)$/i,'').replace(/[_-]+/g,' ')}catch(e){return 'Audio'}}
function fmt(x){if(!isFinite(x))return'0:00';let m=Math.floor(x/60),s=Math.floor(x%60);return m+':'+String(s).padStart(2,'0')}
function setTracks(urls){tracks=[...new Set(urls)].filter(u=>AUDIO_EXT.test(u)).map(u=>({url:u,title:titleFromUrl(u)})); render(); load(0); status.textContent=tracks.length?'Найдено треков: '+tracks.length:'Треки не найдены';}
function load(i){if(!tracks.length){song.textContent='Нет аудиофайлов';return}idx=(i+tracks.length)%tracks.length;a.src=tracks[idx].url;song.textContent=tracks[idx].title;[...tracksBox.children].forEach((n,k)=>n.classList.toggle('now',k===idx));}
function render(){tracksBox.innerHTML='';tracks.forEach((t,i)=>{let d=document.createElement('div');d.className='track';d.textContent=(i+1)+'. '+t.title;d.onclick=()=>{load(i);a.play().catch(showAudioError);plist.classList.remove('open')};tracksBox.appendChild(d)})}
function next(){if(!tracks.length)return;load(random?Math.floor(Math.random()*tracks.length):idx+1);a.play().catch(showAudioError)}
function showAudioError(e){status.textContent='Браузер не дал запустить аудио или файл недоступен. Нажми Play ещё раз / проверь mp3-ссылки.'; console.warn(e)}
async function discover(){
  try{
    const host=location.hostname; const path=location.pathname.replace(/^\//,'').replace(/\/[^\/]*$/,'');
    const m=host.match(/^([^.]+)\.github\.io$/i);
    if(!m) throw new Error('not github pages');
    const owner=m[1]; const repo=path.split('/')[0] || 'audioplayer'; const sub=path.split('/').slice(1).join('/');
    const api=`https://api.github.com/repos/${owner}/${repo}/contents/${sub}?ref=main`;
    const res=await fetch(api,{headers:{Accept:'application/vnd.github+json'}});
    if(!res.ok) throw new Error('api failed');
    const arr=await res.json();
    const urls=(Array.isArray(arr)?arr:[]).filter(x=>x.type==='file'&&AUDIO_EXT.test(x.name)).map(x=>`https://${owner}.github.io/${repo}/${sub?sub+'/':''}${encodeURIComponent(x.name).replace(/%20/g,' ')}`);
    setTracks(urls.length?urls:fallbackUrls);
  }catch(e){setTracks(fallbackUrls)}
}
play.onclick=()=>{if(!tracks.length)return;if(a.paused)a.play().catch(showAudioError);else a.pause()};
$('prev').onclick=()=>{load(idx-1);a.play().catch(showAudioError)}; $('next').onclick=next; $('shuffle').onclick=e=>{random=!random;e.currentTarget.classList.toggle('active',random)}; $('list').onclick=()=>plist.classList.toggle('open');
a.onplay=()=>{play.textContent='❚❚';phone.classList.add('playing')}; a.onpause=()=>{play.textContent='▶';phone.classList.remove('playing')};
a.ontimeupdate=()=>{fill.style.width=(a.currentTime/(a.duration||1)*100)+'%';cur.textContent=fmt(a.currentTime)}; a.onloadedmetadata=()=>dur.textContent=fmt(a.duration); a.onended=next; a.onerror=()=>status.textContent='Не удалось открыть файл: '+(tracks[idx]?.url||'');
$('bar').onclick=e=>{let r=e.currentTarget.getBoundingClientRect();a.currentTime=((e.clientX-r.left)/r.width)*(a.duration||0)};
discover();
</script>
</body>
</html>
